<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Flask Chat – Home</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <style>
        *{box-sizing:border-box;margin:0;padding:0}
        body{
            font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
            min-height:100vh;
            display:flex;
            align-items:center;
            justify-content:center;
            background:linear-gradient(135deg,#1f2933,#111827);
            color:#f9fafb;
        }
        .card{
            background:#020617;
            border-radius:18px;
            padding:24px 24px 20px;
            width:100%;
            max-width:420px;
            box-shadow:0 18px 45px rgba(0,0,0,.55);
            border:1px solid rgba(148,163,184,.35);
        }
        h1{
            font-size:1.4rem;
            margin-bottom:4px;
        }
        p.sub{
            font-size:.85rem;
            color:#9ca3af;
            margin-bottom:18px;
        }
        label{
            font-size:.8rem;
            display:block;
            margin-bottom:4px;
            color:#9ca3af;
        }
        input{
            width:100%;
            padding:10px 12px;
            border-radius:10px;
            border:1px solid #4b5563;
            background:#020617;
            color:#e5e7eb;
            outline:none;
            font-size:.9rem;
        }
        input:focus{
            border-color:#38bdf8;
            box-shadow:0 0 0 1px #38bdf8;
        }
        .field{
            margin-bottom:14px;
        }
        .row{
            display:flex;
            gap:10px;
            margin-top:10px;
        }
        button{
            flex:1;
            border:none;
            border-radius:999px;
            padding:10px 14px;
            font-size:.9rem;
            cursor:pointer;
            font-weight:600;
            transition:transform .12s ease, box-shadow .12s ease, background .12s ease;
        }
        .btn-primary{
            background:#38bdf8;
            color:#020617;
            box-shadow:0 8px 18px rgba(56,189,248,.45);
        }
        .btn-outline{
            background:transparent;
            color:#e5e7eb;
            border:1px solid #4b5563;
        }
        button:hover{
            transform:translateY(-1px);
            box-shadow:0 10px 22px rgba(0,0,0,.35);
        }
        button:active{
            transform:translateY(0);
            box-shadow:none;
        }
        .error{
            margin-top:10px;
            padding:8px 10px;
            border-radius:10px;
            background:rgba(248,113,113,.1);
            border:1px solid rgba(248,113,113,.3);
            color:#fecaca;
            font-size:.8rem;
            display:none;
        }
        .helper{
            margin-top:8px;
            font-size:.75rem;
            color:#6b7280;
        }
    </style>
</head>
<body>
<div class="card">
    <h1>Realtime Chat</h1>
    <p class="sub">Create a room or join an existing one. Video calling is built-in.</p>

    <div class="field">
        <label for="username">Display name</label>
        <input id="username" autocomplete="off" placeholder="e.g. Alex" />
    </div>

    <div class="field">
        <label for="room">Room ID (to join existing)</label>
        <input id="room" autocomplete="off" placeholder="6-character code" maxlength="6" />
    </div>

    <div class="row">
        <button id="createBtn" class="btn-primary">Create new room</button>
        <button id="joinBtn" class="btn-outline">Join room</button>
    </div>

    <div id="error" class="error"></div>
    <div class="helper">Tip: share the room ID with friends so they can join the same space.</div>
</div>

<script>
    const socket = io();
    const usernameInput = document.getElementById("username");
    const roomInput = document.getElementById("room");
    const createBtn = document.getElementById("createBtn");
    const joinBtn = document.getElementById("joinBtn");
    const errorBox = document.getElementById("error");

    function showError(msg){
        errorBox.textContent = msg;
        errorBox.style.display = "block";
    }
    function clearError(){ errorBox.style.display="none"; }

    createBtn.addEventListener("click", () => {
        clearError();
        const username = usernameInput.value.trim();
        if(!username){
            showError("Please choose a display name first.");
            return;
        }
        socket.emit("create_room", { username });
    });

    joinBtn.addEventListener("click", () => {
        clearError();
        const username = usernameInput.value.trim();
        const room = roomInput.value.trim().toUpperCase();
        if(!username){
            showError("Please choose a display name first.");
            return;
        }
        if(!room){
            showError("Enter a room ID to join.");
            return;
        }
        window.location.href = `/chat?room=${encodeURIComponent(room)}&username=${encodeURIComponent(username)}`;
    });

    socket.on("room_created", (data) => {
        const { room_id, username } = data;
        window.location.href = `/chat?room=${encodeURIComponent(room_id)}&username=${encodeURIComponent(username)}`;
    });

    socket.on("error", (data) => {
        if(data && data.message){
            showError(data.message);
        }
    });
</script>
</body>
</html>
